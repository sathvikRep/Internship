<!DOCTYPE html>
<html>
<head>
    <title>Responsive Hero Page</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
        }

        .hero {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 60px 10%;
            min-height: 100vh;
            background: linear-gradient(to right, #1e3c72, #2a5298);
            color: white;
        }

        .hero-content {
            flex: 1;
        }

        .hero-content h1 {
            font-size: 48px;
            margin-bottom: 20px;
        }

        .hero-content p {
            font-size: 18px;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .hero-content button {
            padding: 12px 25px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            background-color: #ff9800;
            color: white;
            cursor: pointer;
            transition: 0.3s ease;
        }

        .hero-content button:hover {
            background-color: #e68900;
        }

        .hero-image {
            flex: 1;
            text-align: center;
        }

        .hero-image img {
            width: 80%;
            max-width: 400px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .hero {
                flex-direction: column;
                text-align: center;
                padding: 40px 5%;
            }

            .hero-content h1 {
                font-size: 32px;
            }

            .hero-image img {
                width: 100%;
                margin-top: 30px;
            }
        }
    </style>
</head>

<body>

<section class="hero">
    <div class="hero-content"
        <h1>Build Your Future with Tech</h1>
        <p>Learn modern web development and create responsive websites using HTML, CSS, and Flexbox. Start your journey today!</p>
        <button>Get Started</button>
    </div>

    <div class="hero-image">
        <!-- Random image generated each refresh -->
        <img src="https://picsum.photos/400/400?random=1" alt="Random Hero Image">
    </div>
</section>

</body>
</html>
